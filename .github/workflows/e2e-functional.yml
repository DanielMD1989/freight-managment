name: E2E Functional

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: e2e-functional-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-functional:
    name: Web Functional UI->DB Regression
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: "postgresql://test:test@localhost:5432/test"
      NEXTAUTH_SECRET: "test-secret"
      JWT_SECRET: "test-jwt-secret-minimum-32-chars-for-validation"
      JWT_ENCRYPTION_KEY: "test-encryption-key-32-chars-min"
      MFA_TOKEN_SECRET: "test-mfa-secret-32-chars-minimum"
      CRON_SECRET: "test-cron-secret"
      NODE_ENV: "test"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Prisma migrations
        run: npx prisma migrate deploy

      - name: Seed test data
        run: npx ts-node scripts/seed-test-data.ts

      - name: Build Next.js app
        run: npm run build
        env:
          NODE_ENV: "production"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Next.js server
        run: |
          npm start &
          echo $! > .next.pid
        env:
          PORT: "3000"

      - name: Wait for server to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3000/api/health > /dev/null; then
              echo "Server is up"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server failed to start in 60s"
          exit 1

      - name: Run web functional regression
        run: npm run test:e2e:functional
        env:
          # Playwright runs headless in CI by default
          CI: "true"

      - name: Stop Next.js server
        if: always()
        run: |
          if [ -f .next.pid ]; then
            kill $(cat .next.pid) || true
            rm .next.pid
          fi

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
