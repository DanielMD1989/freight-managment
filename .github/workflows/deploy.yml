name: Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 300s
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd /var/www/freight
            ./scripts/aws/deploy.sh

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            curl -sf http://localhost:3000/api/health || exit 1
            echo "Health check passed"

      - name: Notify success
        if: success()
        run: echo "Deployed successfully to ${{ secrets.EC2_HOST }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "::error::Deployment failed! Check EC2 logs."
          echo "SSH into server: ssh -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          echo "Check PM2: pm2 logs freight-app --lines 50"
