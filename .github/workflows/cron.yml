name: Scheduled Cron Jobs

on:
  schedule:
    # Run every hour (trip auto-close, GPS monitoring, insurance expiry)
    - cron: "0 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  cron-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trip Monitor (48h auto-close)
        run: |
          curl -sf -X POST "${{ secrets.APP_URL }}/api/cron/trip-monitor" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            || echo "Trip monitor failed (non-fatal)"

      - name: GPS Monitor (signal loss alerts)
        run: |
          curl -sf -X POST "${{ secrets.APP_URL }}/api/cron/gps-monitor" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            || echo "GPS monitor failed (non-fatal)"

      - name: Insurance Monitor (expiry alerts)
        run: |
          curl -sf -X POST "${{ secrets.APP_URL }}/api/cron/insurance-monitor" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            || echo "Insurance monitor failed (non-fatal)"

      - name: Saved Search Monitor (load alerts)
        run: |
          curl -sf -X POST "${{ secrets.APP_URL }}/api/cron/saved-search-monitor" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            || echo "Saved search monitor failed (non-fatal)"

      - name: Aggregate SLA (daily metrics)
        run: |
          curl -sf -X POST "${{ secrets.APP_URL }}/api/cron/aggregate-sla" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            || echo "aggregate-sla failed (non-fatal)"

      - name: Auto-Settle (completed loads)
        run: |
          curl -sf -X POST "${{ secrets.APP_URL }}/api/cron/auto-settle" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            || echo "auto-settle failed (non-fatal)"

      - name: CDL Expiry (driver license alerts)
        run: |
          curl -sf -X POST "${{ secrets.APP_URL }}/api/cron/cdl-expiry" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            || echo "cdl-expiry failed (non-fatal)"

      - name: Expire Loads (old unmatched)
        run: |
          curl -sf -X POST "${{ secrets.APP_URL }}/api/cron/expire-loads" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            || echo "expire-loads failed (non-fatal)"

      - name: Expire Postings (old truck postings)
        run: |
          curl -sf -X POST "${{ secrets.APP_URL }}/api/cron/expire-postings" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            || echo "expire-postings failed (non-fatal)"

      - name: GPS Cleanup (purge old positions)
        run: |
          curl -sf -X POST "${{ secrets.APP_URL }}/api/cron/gps-cleanup" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            || echo "gps-cleanup failed (non-fatal)"
